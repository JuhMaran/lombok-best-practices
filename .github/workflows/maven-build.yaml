name: Build Spring Boot with Maven

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**/*'

jobs:
  build_and_verify:
    name: Run Merge Checks
    runs-on: ubuntu-latest

    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Maven Wrapper files
        run: |
          test -f mvnw || exit 1
          test -f .mvn/wrapper/maven-wrapper.jar || exit 1
          test -f .mvn/wrapper/maven-wrapper.properties || exit 1        

      # Java mais recente LTS (25)
      - name: Setup Java 25 (LTS)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          architecture: x64
          cache: maven

      # Garantir execução no Linux runner
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # Build completo com flags modernas (--ntp)
      - name: Build with Maven
        run: ./mvnw clean verify -B --no-transfer-progress

      # Publicação de resultados de testes
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          files: target/surefire-reports/TEST-*.xml

